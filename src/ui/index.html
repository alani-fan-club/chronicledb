<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChronicleDB — Mind Map</title>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/"
    }
  }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- ── Left sidebar: Character Picker ────────────────── -->
    <aside id="character-sidebar" role="navigation" aria-label="Character filter">
      <div class="sidebar-header">
        <span class="sidebar-title">Characters</span>
      </div>
      <button id="btn-show-all" class="show-all-btn active" title="Show all characters">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
        <span>Show All</span>
      </button>
      <div id="character-list" class="character-list">
        <!-- Populated dynamically -->
      </div>
    </aside>

    <!-- ── Center column ─────────────────────────────────── -->
    <div id="center-column">

      <!-- ── Top bar ───────────────────────────────────── -->
      <header id="topbar">
        <div class="topbar-left">
          <div class="brand">
            <svg class="brand-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FF5841" stroke-width="1.8" stroke-linecap="square" stroke-linejoin="miter">
              <rect x="3" y="3" width="18" height="18"/>
              <path d="M3 12h18M12 3v18"/>
            </svg>
            <span class="brand-name">ChronicleDB</span>
          </div>
        </div>

        <div class="topbar-center">
          <div class="search-wrapper">
            <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" id="search-input" placeholder="Search characters, locations..." aria-label="Search graph nodes">
            <span id="search-count" class="search-count"></span>
          </div>
          <select id="chat-filter" class="chat-filter" title="Limit the graph to a single chat" aria-label="Filter by chat">
            <option value="">All chats</option>
          </select>
        </div>

        <div class="topbar-right">
          <div id="edge-chips" class="edge-chips">
            <button class="chip active" aria-pressed="true" data-edge="FEELS_ABOUT" title="Character relationships">
              <span class="chip-dot" style="background:#FF5841"></span>Relations
            </button>
            <button class="chip active" aria-pressed="true" data-edge="KNOWS" title="Character knowledge of facts">
              <span class="chip-dot" style="background:#555"></span>Knowledge
            </button>
            <button class="chip active" aria-pressed="true" data-edge="PARTICIPATED_IN,OCCURRED_AT" title="Events and where they happened">
              <span class="chip-dot" style="background:#d4a574"></span>Events
            </button>
            <button class="chip active" aria-pressed="true" data-edge="OWNS,LOCATED_AT" title="Items and their owners/locations">
              <span class="chip-dot" style="background:#a88b6a"></span>Items
            </button>
            <button class="chip active" aria-pressed="true" data-edge="INVOLVED_IN" title="Plot threads (foreshadowing, pending)">
              <span class="chip-dot" style="background:#c77d5c"></span>Plots
            </button>
            <button class="chip" aria-pressed="false" data-edge="CONTAINS_EVENT" title="Story arcs containing events">
              <span class="chip-dot" style="background:#FF5841"></span>Arcs
            </button>
            <button class="chip" aria-pressed="false" data-edge="CAUSED" title="Causal chains between events">
              <span class="chip-dot" style="background:#ff7057"></span>Chains
            </button>
          </div>

          <div class="topbar-actions">
            <button id="btn-fit" class="icon-btn" title="Fit to view">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/>
              </svg>
            </button>
            <button id="btn-layout" class="icon-btn" title="Re-layout graph">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
              </svg>
            </button>
            <button id="btn-export" class="icon-btn" title="Export as PNG">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
            </button>
          </div>
        </div>
      </header>

      <!-- ── Three.js canvas ───────────────────────────── -->
      <main id="main">
        <div id="cy"></div>
        <div id="hover-label" class="hover-label"></div>

        <!-- ── Right detail panel ────────────────────── -->
        <aside id="detail-panel" class="hidden" tabindex="-1" role="dialog" aria-label="Node details">
          <button id="btn-close-panel" title="Close panel">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
          <div id="detail-content">
            <!-- Populated dynamically -->
          </div>
        </aside>
      </main>
    </div>
  </div>

  <script type="module" src="mindmap.js"></script>
</body>
</html>
